# Make a Short — ON DEMAND (machine off).
# Click "Run workflow" (GitHub web or mobile app) whenever you want Shorts. The job proposes
# fresh ideas to your Telegram with Make-it/Pass/Reject buttons, waits for your taps, produces
# the approved ones, and replies with the YouTube links. Repeat as often as you like.
name: make-short

on:
  workflow_dispatch:
    inputs:
      ideas:
        description: "How many ideas to propose"
        default: "3"
        required: false
      wait_min:
        description: "Minutes to wait for your Telegram taps"
        default: "20"
        required: false

jobs:
  make:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg + espeak-ng (Kokoro TTS phonemizer)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg espeak-ng

      - name: Cache TTS/ASR models (Kokoro + faster-whisper)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/kokoro
            ~/.cache/huggingface
          key: models-kokoro1.0-whisper-base-v1

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Make a Short (on demand)
        env:                     # secrets configured in repo Settings -> Secrets (rule 5)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_APPROVAL_MODE: webhook
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          VOICE_ENGINE: ${{ vars.VOICE_ENGINE || 'google' }}          # google | edge | kokoro (chain fallback)
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}       # Chirp 3 HD; empty -> falls back to edge-tts
          GOOGLE_TTS_VOICE: ${{ vars.GOOGLE_TTS_VOICE }}              # an en-IN Chirp3-HD voice name
          GOOGLE_TTS_LANGUAGE: ${{ vars.GOOGLE_TTS_LANGUAGE || 'en-IN' }}
          ENABLE_HUMAN_ANGLE: ${{ vars.ENABLE_HUMAN_ANGLE || 'true' }}  # require a genuine why-it-matters take
          CAPTION_FONT: ${{ vars.CAPTION_FONT || 'Montserrat' }}
          CAPTION_HIGHLIGHT_COLOR: ${{ vars.CAPTION_HIGHLIGHT_COLOR || '&H0000FFFF' }}  # active-word fill colour
          ENABLE_TEXT_CARDS: ${{ vars.ENABLE_TEXT_CARDS || 'true' }}  # on-screen key-point cards (story-specific)
          CARD_SECONDS: ${{ vars.CARD_SECONDS || '1.8' }}            # how long each key-point card flashes
          NEWS_RSS_URL: ${{ vars.NEWS_RSS_URL }}                     # optional: override the news feed seeding ideation
          YOUTUBE_PRIVACY: ${{ vars.YOUTUBE_PRIVACY || 'public' }}   # set var to 'unlisted' for safe first runs
          VISUAL_SOURCE: ${{ vars.VISUAL_SOURCE || 'photos' }}        # photos | ai | video
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}                   # optional: Cloudflare Workers AI (VISUAL_SOURCE=ai)
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          IMAGE_STYLE: ${{ vars.IMAGE_STYLE }}                        # optional: AI-image style override
          CAPTION_WORDS: ${{ vars.CAPTION_WORDS || '3' }}            # words per karaoke phrase
          ENABLE_DESC_FOOTER: ${{ vars.ENABLE_DESC_FOOTER || 'true' }}  # append brand footer to descriptions
          DESCRIPTION_FOOTER: ${{ vars.DESCRIPTION_FOOTER }}         # optional: override the default footer
          ENABLE_HOOK_CAPTION: ${{ vars.ENABLE_HOOK_CAPTION || 'true' }}  # frame-1 title hook banner (CTR)
          HOOK_SECONDS: ${{ vars.HOOK_SECONDS || '1.8' }}            # how long the hook banner shows
          CLIP_SECONDS: ${{ vars.CLIP_SECONDS || '3.5' }}           # B-roll cut length (fast = more retention)
          ENABLE_HOOK_JUDGE: ${{ vars.ENABLE_HOOK_JUDGE || 'true' }} # LLM punches up weak hooks/titles pre-render
          KOKORO_SPEED: ${{ vars.KOKORO_SPEED || '1.0' }}           # voice speed
          ENABLE_DRAMATIC_PACING: ${{ vars.ENABLE_DRAMATIC_PACING || 'true' }}  # snappier mid-script + beat before payoff
          PAUSE_BETWEEN: ${{ vars.PAUSE_BETWEEN || '0.18' }}        # inter-sentence silence (s)
          PAUSE_BEFORE_PAYOFF: ${{ vars.PAUSE_BEFORE_PAYOFF || '0.5' }}  # dramatic beat before the last line (s)
          MUSIC_VOLUME: ${{ vars.MUSIC_VOLUME || '0.10' }}          # bgm loudness under narration
          IDEAS: ${{ inputs.ideas }}
          WAIT_MIN: ${{ inputs.wait_min }}
        run: python -m src.production make
