# Production pipeline — render + publish approved ideas.
# SKELETON: manual-trigger only for now. Uncomment the schedule once modules work (rule 7).
# Cron is UTC (rule 15): stagger 4–5 posts through the day. 08:00 IST ~= 02:30 UTC.
name: production

on:
  workflow_dispatch: {}        # run manually from the Actions tab
  # schedule:
  #   - cron: "30 2,5,8,11,14 * * *"   # UTC, staggered — enable when ready

jobs:
  produce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg + espeak-ng (Kokoro TTS phonemizer)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg espeak-ng

      - name: Cache TTS/ASR models (Kokoro + faster-whisper)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/kokoro
            ~/.cache/huggingface
          key: models-kokoro1.0-whisper-base-v1

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run production pipeline
        env:                     # secrets configured in repo Settings -> Secrets (rule 5)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PRIVACY: ${{ vars.YOUTUBE_PRIVACY || 'public' }}
          VISUAL_SOURCE: ${{ vars.VISUAL_SOURCE || 'photos' }}        # photos | ai | video
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          IMAGE_STYLE: ${{ vars.IMAGE_STYLE }}
          CAPTION_WORDS: ${{ vars.CAPTION_WORDS || '2' }}
          KOKORO_SPEED: ${{ vars.KOKORO_SPEED || '1.0' }}
          MUSIC_VOLUME: ${{ vars.MUSIC_VOLUME || '0.10' }}
        run: python -m src.production
