name: _cf-test
on:
  workflow_dispatch: {}
jobs:
  t:
    runs-on: ubuntu-latest
    steps:
      - name: Test Cloudflare auth from CI
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "token length in CI: ${#CF_API_TOKEN} (expected 53)"
          echo "account length in CI: ${#CF_ACCOUNT_ID} (expected 32)"
          code=$(curl -s -o /tmp/out.json -w "%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/ai/run/@cf/black-forest-labs/flux-1-schnell" \
            -H "Authorization: Bearer $CF_API_TOKEN" -d '{"prompt":"a test image"}')
          echo "Flux HTTP status from CI: $code"
          head -c 300 /tmp/out.json
